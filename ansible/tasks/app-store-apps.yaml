- name: Ensure mas CLI is installed
  community.general.homebrew:
    name: mas
    state: present
  environment: "{{ homebrew_environment | combine({'HOMEBREW_NO_AUTO_UPDATE': '1'}) }}"
  tags:
    - app-store
    - install

- name: Read Mac App Store app IDs from Brewfile
  ansible.builtin.command: ruby -ne 'puts $1 if /^\s*mas\s+"[^"]+",\s+id:\s*([0-9]+)/' "{{ playbook_dir }}/Brewfile.app-store"
  args:
    chdir: "{{ playbook_dir }}"
  register: app_store_app_ids
  changed_when: false
  tags:
    - app-store
    - install

- name: Index applications for mas
  ansible.builtin.command: mdimport /Applications
  changed_when: false
  failed_when: false
  tags:
    - app-store
    - install

- name: Install Mac App Store apps
  ansible.builtin.shell: |
    set -o pipefail
    mas_path="$(command -v mas)"

    sudo -A "$mas_path" get "{{ item }}" || sudo -A "$mas_path" install "{{ item }}"
  args:
    executable: /bin/bash
  loop: "{{ app_store_app_ids.stdout_lines }}"
  register: app_store_install
  changed_when: >-
    'Installing' in app_store_install.stdout or
    'Installed' in app_store_install.stdout or
    'Getting' in app_store_install.stdout
  failed_when: false
  environment: "{{ homebrew_environment }}"
  when: item is match('^[0-9]+$')
  tags:
    - app-store
    - install
